name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve signing mode
        id: signing
        run: |
          missing=()
          for name in DEVELOPER_ID_CERTIFICATE_BASE64 DEVELOPER_ID_CERTIFICATE_PASSWORD DEVELOPER_ID_SIGNING_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("${name}")
            fi
          done

          if [[ "${#missing[@]}" -eq 0 ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Release will use Developer ID signing and notarization."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Release will use ad hoc signing and skip notarization."
            for name in "${missing[@]}"; do
              echo "::warning::Missing optional Developer ID release secret: ${name}"
            done
          fi
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          DEVELOPER_ID_SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Import Developer ID certificate
        if: github.ref_type == 'tag' && steps.signing.outputs.available == 'true'
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"

          printf '%s' "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH" 2>/dev/null || \
            printf '%s' "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}

      - name: Resolve build version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: |
          if [[ "${SIGNING_AVAILABLE}" == "true" ]]; then
            export SIGN_IDENTITY="${DEVELOPER_ID_SIGNING_IDENTITY}"
          else
            export SIGN_IDENTITY="-"
          fi
          ./script/build_app.sh
        env:
          CONFIGURATION: release
          APP_BUILD: ${{ github.run_number }}
          SIGNING_AVAILABLE: ${{ github.ref_type == 'tag' && steps.signing.outputs.available == 'true' && 'true' || 'false' }}
          DEVELOPER_ID_SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_SIGNING_IDENTITY }}

      - name: Notarize app bundle
        if: github.ref_type == 'tag' && steps.signing.outputs.available == 'true'
        run: ./script/notarize_app.sh
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Archive app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            VERSION="manual-${GITHUB_SHA::7}"
          fi
          ZIP_NAME="MacFocusFix-${VERSION}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent dist/MacFocusFix.app "dist/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: MacFocusFix-macOS
          path: dist/*.zip

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          repository: Souitou-iop/macOS-Windows-FIX
          files: dist/${{ env.ZIP_NAME }}
          generate_release_notes: true
